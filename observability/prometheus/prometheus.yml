global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'backend'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['wacchat-backend:8082']
        labels: { service: backend }

  - job_name: 'api-gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['wacchat-api-gateway:8081']
        labels: { service: api-gateway }

  - job_name: 'file-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['wacchat-file-service:8083']
        labels: { service: file-service }
