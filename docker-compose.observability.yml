name: wacchat-observability

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: wacchat-prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - wacchat_wacchat
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: wacchat-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - wacchat_wacchat
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.0
    container_name: wacchat-loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - wacchat_wacchat
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.1
    container_name: wacchat-tempo
    command: -config.file=/etc/tempo/tempo.yml
    ports:
      - "4318:4318"   # OTLP HTTP
      - "4317:4317"   # OTLP gRPC
      - "3200:3200"   # Tempo query API (used by Grafana)
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    networks:
      - wacchat_wacchat
    restart: unless-stopped

networks:
  wacchat_wacchat:
    external: true

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:
