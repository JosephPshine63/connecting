server:
  port: 8084

spring:
  banner:
    location: classpath:banner/banner.txt
  application:
    name: notification-service
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:wacchat}
    password: ${RABBITMQ_PASSWORD:wacchat}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/wacchat}
          audiences:
            - wacchat-app

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

application:
  notification:
    exchange: wacchat.notifications
    routing-key: notification
    queue: wacchat.notifications.queue
    broker-relay-host: ${RABBITMQ_HOST:localhost}
    broker-relay-port: ${RABBITMQ_STOMP_PORT:61613}
  backend:
    base-url: ${BACKEND_BASE_URL:http://localhost:8082}
    internal-api-key: ${BACKEND_INTERNAL_API_KEY:}
    connect-timeout-ms: 2000
    response-timeout-ms: 5000

resilience4j:
  circuitbreaker:
    instances:
      sessionValidation:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      sessionValidation:
        maxAttempts: 2
        waitDuration: 300ms
