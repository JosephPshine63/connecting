<div class="session-blocked-overlay">
  <div class="session-blocked-box">
    <div class="session-blocked-icon">
      <i class="fa-solid fa-user-lock"></i>
    </div>
    <h2 class="session-blocked-title">Sessione già attiva</h2>
    <p class="session-blocked-sub">
      Hai già una sessione aperta su un altro dispositivo o un'altra scheda.
      Chiudi quella sessione per continuare qui, oppure riprova se l'hai già fatto.
    </p>

    <button class="session-blocked-retry-btn" [disabled]="retrying" (click)="retry()">
      @if (retrying) {
        <i class="fa-solid fa-spinner fa-spin"></i> Verifica…
      } @else {
        Riprova
      }
    </button>
    <button class="session-blocked-logout-btn" (click)="logout()">
      Esci
    </button>
  </div>
</div>
