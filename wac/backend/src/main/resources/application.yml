spring:
  datasource:
    #url: jdbc:postgresql://localhost:5432/postgres-connecting
    url: jdbc:postgresql://localhost:5432/postgres
    username: admin
    password: admin
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/connecting
          audiences:
            - connecting-app
  servlet:
    multipart:
      max-file-size: 50MB

springdoc:
  default-produces-media-type: application/json


application:
  file:
    uploads:
      media-output-path: ./uploads