server:
  port: 8082

spring:
  banner:
    location: classpath:banner/banner.txt
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/wacchat_db}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:admin}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:admin}}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
  mail:
    host: smtp.resend.com
    port: 465
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/wacchat}
          audiences:
            - wacchat-app
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

management:
  health:
    mail:
      enabled: false

springdoc:
  default-produces-media-type: application/json


application:
  keycloak:
    admin-url: ${KEYCLOAK_ADMIN_URL:http://keycloak-wacchat:8080}
    realm: wacchat
    admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
  mail:
    from: ${MAIL_FROM:}
  cleanup:
    inactivity-days: 21
    protected-email: ${ADMIN_EMAIL:}
  file-service:
    base-url: ${FILE_SERVICE_BASE_URL:http://localhost:8083}
    internal-api-key: ${FILE_SERVICE_INTERNAL_API_KEY:}
    connect-timeout-ms: 2000
    response-timeout-ms: 15000
  session:
    stale-after-seconds: ${SESSION_STALE_SECONDS:120}

resilience4j:
  circuitbreaker:
    instances:
      fileService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        ignoreExceptions:
          - org.springframework.web.server.ResponseStatusException
  retry:
    instances:
      fileService:
        maxAttempts: 2
        waitDuration: 300ms
        ignoreExceptions:
          - org.springframework.web.server.ResponseStatusException