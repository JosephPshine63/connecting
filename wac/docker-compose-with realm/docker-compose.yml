services:
  postgres:
    container_name: postgres-sql-wac-realm
    image: postgres
    environment:
      POSTGRES_USER: wac
      POSTGRES_PASSWORD: wac
      PGDATA: /var/lib/postgresql/data
      POSTGRES_DB: whatsapp_clone
    volumes:
      - postgres:/data/postgres
    ports:
      - 5432:5432
    networks:
      - whatsapp-clone-realm
    restart: unless-stopped

  keycloak:
    container_name: keycloak-wac-realm
    image: quay.io/keycloak/keycloak:26.0.0
    ports:
      - 9090:8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    networks:
      - whatsapp-clone-realm
    volumes:
      - ../keycloak/realms:/opt/keycloak/data/import
    command:
      - "start-dev"
      - "--import-realm"
networks:
  whatsapp-clone-realm:
    driver: bridge

volumes:
  postgres:
    driver: local
